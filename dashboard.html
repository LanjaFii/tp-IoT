<template>
    <div class="industrial-dashboard">
        <div class="panel header-panel">
            <div class="machine-info">
                <div class="glitch-box">
                    <span class="value active">MACHINE_{{ machineId }}</span>
                </div>
            </div>
            <div class="global-status-container">
                <div class="status-led" :class="{ 'led-alert': alerts !== 'OK' }"></div>
                <div class="global-status-text">{{ alerts }}</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="panel gauge-section">
                <div class="panel-header">TÉLÉMÉTRIE TEMPS RÉEL</div>
                <div class="gauge-grid">
                    <div class="gauge-wrapper">
                        <div :id="'chartTemp_' + machineId"></div>
                        <div class="gauge-info">TEMPÉRATURE</div>
                    </div>
                    <div class="gauge-wrapper">
                        <div :id="'chartHum_' + machineId"></div>
                        <div class="gauge-info">HUMIDITÉ</div>
                    </div>
                    <div class="gauge-wrapper">
                        <div :id="'chartVib_' + machineId"></div>
                        <div class="gauge-info">VIBRATION</div>
                    </div>
                </div>
            </div>

            <div class="panel trend-section">
                <div class="panel-header">ANALYSE DES TENDANCES (30 PTS)</div>
                <div :id="'chartHistory_' + machineId"></div>
            </div>

            <div class="alerts-row">
                <div class="psr-lcd fire" :class="{ active: flamme }">
                    <div class="lcd-scanlines"></div>
                    <div class="lcd-content">
                        <div class="lcd-icon">🔥</div>
                        <div class="lcd-text">
                            <span class="lcd-title">FLAME SENSOR</span>
                            <span class="lcd-val">{{ flamme ? '!!! DANGER !!!' : 'SYSTEM READY' }}</span>
                        </div>
                    </div>
                </div>

                <div class="psr-lcd smoke" :class="{ active: fumee }">
                    <div class="lcd-scanlines"></div>
                    <div class="lcd-content">
                        <div class="lcd-icon">💨</div>
                        <div class="lcd-text">
                            <span class="lcd-title">SMOKE SENSOR</span>
                            <span class="lcd-val">{{ fumee ? '!!! DANGER !!!' : 'SYSTEM READY' }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script>
export default {
    data() {
        return {
            machineId: "1",
            colors: { temp: '#FEB019', hum: '#00E396', vib: '#FF4560' },
            charts: { temp: null, hum: null, vib: null, history: null },
            temperature: 0, humidity: 0, vibration: 0,
            flamme: false, fumee: false, alerts: "OK",
            historyData: { temp: [], hum: [], vib: [], times: [] },
            MAX_POINTS: 30
        }
    },
    watch: {
        msg: function(m) {
            if (!m || String(m.machine) !== String(this.machineId)) return;
            
            this.temperature = parseFloat(m.temperature) || 0;
            this.humidity = parseFloat(m.humidity) || 0;
            this.vibration = parseFloat(m.vibration) || 0;
            this.flamme = !!m.flamme;
            this.fumee = !!m.fumee;
            this.alerts = m.alerts || "OK";

            this.syncUI();
        }
    },
    methods: {
        syncUI() {
            // Conversion en pourcentage pour le remplissage visuel de la jauge
            // (Valeur / Max) * 100
            if (this.charts.temp) this.charts.temp.updateSeries([(this.temperature / 50) * 100]);
            if (this.charts.hum) this.charts.hum.updateSeries([this.humidity]);
            if (this.charts.vib) this.charts.vib.updateSeries([(this.vibration / 10) * 100]);
            
            const now = new Date().toLocaleTimeString();
            this.historyData.temp.push(this.temperature);
            this.historyData.hum.push(this.humidity);
            this.historyData.vib.push(this.vibration);
            this.historyData.times.push(now);

            if (this.historyData.temp.length > this.MAX_POINTS) {
                this.historyData.temp.shift(); this.historyData.hum.shift();
                this.historyData.vib.shift(); this.historyData.times.shift();
            }

            if (this.charts.history) {
                this.charts.history.updateSeries([
                    { name: 'Temp', data: this.historyData.temp },
                    { name: 'Humid', data: this.historyData.hum },
                    { name: 'Vibra', data: this.historyData.vib }
                ]);
            }
        },
        getGaugeConfig(color, max, unit) {
            return {
                chart: { type: 'radialBar', height: 180, sparkline: { enabled: true } },
                series: [0],
                colors: [color],
                plotOptions: {
                    radialBar: {
                        startAngle: -110, endAngle: 110,
                        hollow: { size: '60%' },
                        track: { background: '#1a1a1a', strokeWidth: '95%' },
                        dataLabels: {
                            name: { show: false },
                            value: { 
                                offsetY: 5, 
                                fontSize: '14px', 
                                fontWeight: 'bold', 
                                color: '#fff', 
                                // Calcul pour ré-afficher la valeur exacte à partir du pourcentage
                                formatter: (v) => ((v / 100) * max).toFixed(1) + unit 
                            }
                        }
                    }
                },
                stroke: { lineCap: 'butt', dashArray: 2 }
            };
        },
        init() {
            this.charts.temp = new ApexCharts(document.querySelector("#chartTemp_" + this.machineId), this.getGaugeConfig(this.colors.temp, 50, '°'));
            this.charts.hum = new ApexCharts(document.querySelector("#chartHum_" + this.machineId), this.getGaugeConfig(this.colors.hum, 100, '%'));
            this.charts.vib = new ApexCharts(document.querySelector("#chartVib_" + this.machineId), this.getGaugeConfig(this.colors.vib, 10, ''));

            const histCfg = {
                chart: { type: 'area', height: 140, toolbar: { show: false }, animations: { enabled: false } },
                colors: [this.colors.temp, this.colors.hum, this.colors.vib],
                dataLabels: { enabled: false },
                stroke: { curve: 'smooth', width: 2 },
                fill: { type: 'gradient', gradient: { opacityFrom: 0.3, opacityTo: 0 } },
                series: [{ name: 'T°', data: [] }, { name: 'H%', data: [] }, { name: 'Vib', data: [] }],
                xaxis: { labels: { show: false }, axisBorder: { show: false } },
                yaxis: { labels: { show: false } },
                grid: { borderColor: '#1a1a1a' },
                legend: { show: true, position: 'top', fontSize: '10px', labels: { colors: '#888' } }
            };
            this.charts.history = new ApexCharts(document.querySelector("#chartHistory_" + this.machineId), histCfg);
            Object.values(this.charts).forEach(c => c && c.render());
        }
    },
    mounted() {
        if (window.ApexCharts) { this.init(); }
        else {
            const s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/apexcharts";
            s.onload = () => this.init();
            document.head.appendChild(s);
        }
    }
}
</script>
